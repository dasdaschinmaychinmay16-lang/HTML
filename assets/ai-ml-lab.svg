<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 560" role="img" aria-label="AI and ML workflow">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#eef5f3"/>
      <stop offset="1" stop-color="#e8eeff"/>
    </linearGradient>
    <linearGradient id="ml-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2d3d"/>
      <stop offset="1" stop-color="#17202a"/>
    </linearGradient>
    <filter id="s1" x="-8%" y="-8%" width="116%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="7" flood-color="#17202a" flood-opacity="0.10"/>
    </filter>
    <filter id="s2" x="-8%" y="-8%" width="116%" height="135%">
      <feDropShadow dx="0" dy="5" stdDeviation="12" flood-color="#17202a" flood-opacity="0.18"/>
    </filter>
    <style>
      .fl  { stroke-dasharray:10 7; animation:flow  5s linear infinite }
      .fl2 { stroke-dasharray:10 7; animation:flow2 4s linear infinite }
      .bk  { animation:blink 2.2s ease-in-out infinite }
      .nn  { animation:blink 1.8s ease-in-out infinite alternate }
      @keyframes flow  { to { stroke-dashoffset:-102 } }
      @keyframes flow2 { to { stroke-dashoffset:-102 } }
      @keyframes blink { 0%,100%{opacity:.55} 50%{opacity:1} }
    </style>
  </defs>

  <!-- Background panel -->
  <rect width="760" height="560" rx="14" fill="url(#bg)"/>
  <!-- Subtle grid -->
  <g stroke="rgba(15,118,110,0.055)" stroke-width="1" fill="none">
    <line x1="0" y1="56" x2="760" y2="56"/><line x1="0" y1="112" x2="760" y2="112"/>
    <line x1="0" y1="168" x2="760" y2="168"/><line x1="0" y1="224" x2="760" y2="224"/>
    <line x1="0" y1="280" x2="760" y2="280"/><line x1="0" y1="336" x2="760" y2="336"/>
    <line x1="0" y1="392" x2="760" y2="392"/><line x1="0" y1="448" x2="760" y2="448"/>
    <line x1="0" y1="504" x2="760" y2="504"/>
    <line x1="76" y1="0" x2="76" y2="560"/><line x1="152" y1="0" x2="152" y2="560"/>
    <line x1="228" y1="0" x2="228" y2="560"/><line x1="304" y1="0" x2="304" y2="560"/>
    <line x1="380" y1="0" x2="380" y2="560"/><line x1="456" y1="0" x2="456" y2="560"/>
    <line x1="532" y1="0" x2="532" y2="560"/><line x1="608" y1="0" x2="608" y2="560"/>
    <line x1="684" y1="0" x2="684" y2="560"/>
  </g>

  <!-- ══ CONNECTOR PATHS (behind cards) ══ -->

  <!-- Sensor data → ML model -->
  <path d="M278 114 C370 114 412 170 488 178"
        fill="none" stroke="#0f766e" stroke-width="3" class="fl" opacity="0.85"/>
  <!-- Process logs → ML model -->
  <path d="M278 278 C370 278 428 210 488 195"
        fill="none" stroke="#2563eb" stroke-width="3" class="fl" opacity="0.8"/>
  <!-- Operator input → ML model -->
  <path d="M278 442 C380 442 448 280 488 212"
        fill="none" stroke="#c0840f" stroke-width="3" class="fl" opacity="0.8"/>
  <!-- ML model → Action layer (vertical) -->
  <path d="M605 264 L605 308"
        fill="none" stroke="#0f766e" stroke-width="4" class="fl2" opacity="0.9"/>

  <!-- Arrow tip: ML → Action -->
  <polygon points="605,310 598,296 612,296" fill="#0f766e" opacity="0.9"/>

  <!-- Junction nodes -->
  <circle cx="370" cy="128" r="14" fill="#ffffff" stroke="#0f766e" stroke-width="3" filter="url(#s1)"/>
  <circle cx="370" cy="128" r="6"  fill="#0f766e"/>

  <circle cx="400" cy="263" r="14" fill="#ffffff" stroke="#2563eb" stroke-width="3" filter="url(#s1)"/>
  <circle cx="400" cy="263" r="6"  fill="#2563eb"/>

  <circle cx="450" cy="356" r="14" fill="#ffffff" stroke="#c0840f" stroke-width="3" filter="url(#s1)"/>
  <circle cx="450" cy="356" r="6"  fill="#c0840f"/>

  <!-- ══ INPUT CARD 1: Sensor data ══ -->
  <g filter="url(#s1)">
    <rect x="42" y="56" width="236" height="116" rx="10" fill="#ffffff"/>
    <!-- Left accent -->
    <rect x="42" y="56" width="6" height="116" rx="3" fill="#0f766e"/>
    <!-- Bar chart icon -->
    <rect x="64" y="90"  width="10" height="38" rx="4" fill="#0f766e" opacity="0.9"/>
    <rect x="80" y="78"  width="10" height="50" rx="4" fill="#0f766e" opacity="0.7"/>
    <rect x="96" y="68"  width="10" height="60" rx="4" fill="#0f766e" opacity="0.5"/>
    <rect x="112" y="82" width="10" height="46" rx="4" fill="#0f766e" opacity="0.65"/>
    <rect x="128" y="72" width="10" height="56" rx="4" fill="#0f766e" opacity="0.4"/>
    <!-- Label -->
    <text x="150" y="97"  font-family="Sora,sans-serif"   font-size="14" font-weight="800" fill="#17202a">Sensor data</text>
    <text x="150" y="115" font-family="Manrope,sans-serif" font-size="10" font-weight="600" fill="#53616f">Machine &amp; IoT signals</text>
    <!-- Mini pulse line at bottom -->
    <polyline points="64,144 80,136 96,148 112,130 128,142 144,134 160,144"
              fill="none" stroke="#0f766e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>

  <!-- ══ INPUT CARD 2: Process logs ══ -->
  <g filter="url(#s1)">
    <rect x="42" y="220" width="236" height="116" rx="10" fill="#ffffff"/>
    <rect x="42" y="220" width="6" height="116" rx="3" fill="#2563eb"/>
    <!-- Document / log icon -->
    <rect x="64" y="240" width="58" height="72" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
    <rect x="72" y="254" width="42" height="6" rx="3" fill="#2563eb" opacity="0.9"/>
    <rect x="72" y="266" width="34" height="6" rx="3" fill="#2563eb" opacity="0.65"/>
    <rect x="72" y="278" width="38" height="6" rx="3" fill="#2563eb" opacity="0.45"/>
    <rect x="72" y="290" width="26" height="6" rx="3" fill="#2563eb" opacity="0.3"/>
    <!-- Label -->
    <text x="134" y="260" font-family="Sora,sans-serif"   font-size="14" font-weight="800" fill="#17202a">Process logs</text>
    <text x="134" y="278" font-family="Manrope,sans-serif" font-size="10" font-weight="600" fill="#53616f">Historical event data</text>
    <!-- Event count pill -->
    <rect x="134" y="294" width="66" height="20" rx="10" fill="#eff6ff"/>
    <text x="167" y="308" font-family="Manrope,sans-serif" font-size="10" font-weight="700" fill="#2563eb" text-anchor="middle">2 048 events</text>
  </g>

  <!-- ══ INPUT CARD 3: Operator input ══ -->
  <g filter="url(#s1)">
    <rect x="42" y="384" width="236" height="116" rx="10" fill="#ffffff"/>
    <rect x="42" y="384" width="6" height="116" rx="3" fill="#c0840f"/>
    <!-- Slider control icon -->
    <!-- Slider 1 -->
    <rect x="64" y="406" width="90" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="64" y="406" width="58" height="6" rx="3" fill="#c0840f" opacity="0.85"/>
    <circle cx="122" cy="409" r="8" fill="#ffffff" stroke="#c0840f" stroke-width="2.5"/>
    <!-- Slider 2 -->
    <rect x="64" y="424" width="90" height="6" rx="3" fill="#e5e7eb"/>
    <rect x="64" y="424" width="35" height="6" rx="3" fill="#c0840f" opacity="0.6"/>
    <circle cx="99" cy="427" r="8" fill="#ffffff" stroke="#c0840f" stroke-width="2.5"/>
    <!-- Toggle row -->
    <rect x="64" y="444" width="34" height="16" rx="8" fill="#c0840f" opacity="0.85"/>
    <circle cx="90" cy="452" r="6" fill="#ffffff"/>
    <rect x="104" y="444" width="34" height="16" rx="8" fill="#e5e7eb"/>
    <circle cx="112" cy="452" r="6" fill="#ffffff"/>
    <!-- Label -->
    <text x="164" y="416" font-family="Sora,sans-serif"   font-size="14" font-weight="800" fill="#17202a">Operator</text>
    <text x="164" y="432" font-family="Sora,sans-serif"   font-size="14" font-weight="800" fill="#17202a">input</text>
    <text x="164" y="452" font-family="Manrope,sans-serif" font-size="10" font-weight="600" fill="#53616f">Overrides &amp; settings</text>
  </g>

  <!-- ══ ML MODEL CARD ══ -->
  <g filter="url(#s2)">
    <rect x="488" y="72" width="234" height="192" rx="12" fill="url(#ml-bg)"/>
    <!-- Top accent -->
    <rect x="488" y="72" width="234" height="5" rx="3" fill="#0f766e"/>

    <!-- Neural network icon -->
    <!-- L1 input nodes -->
    <circle cx="526" cy="124" r="9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <circle cx="526" cy="152" r="9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <circle cx="526" cy="180" r="9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
    <!-- L2 hidden nodes -->
    <circle cx="584" cy="134" r="11" fill="#0f766e" opacity="0.85"/>
    <circle cx="584" cy="168" r="11" fill="#0f766e" opacity="0.65"/>
    <!-- L3 output node -->
    <circle cx="640" cy="152" r="14" fill="#0f766e"/>
    <circle cx="640" cy="152" r="7"  fill="#ffffff" class="bk"/>
    <!-- L1→L2 connections -->
    <g stroke="rgba(255,255,255,0.14)" stroke-width="1.5" fill="none">
      <line x1="535" y1="124" x2="573" y2="134"/>
      <line x1="535" y1="124" x2="573" y2="168"/>
      <line x1="535" y1="152" x2="573" y2="134"/>
      <line x1="535" y1="152" x2="573" y2="168"/>
      <line x1="535" y1="180" x2="573" y2="134"/>
      <line x1="535" y1="180" x2="573" y2="168"/>
    </g>
    <!-- L2→L3 connections -->
    <g stroke="rgba(15,118,110,0.7)" stroke-width="2" fill="none">
      <line x1="595" y1="134" x2="626" y2="152"/>
      <line x1="595" y1="168" x2="626" y2="152"/>
    </g>

    <!-- Label -->
    <text x="506" y="216" font-family="Sora,sans-serif" font-size="16" font-weight="800" fill="#ffffff">ML model</text>

    <!-- Confidence bar -->
    <rect x="506" y="228" width="198" height="7" rx="3.5" fill="rgba(255,255,255,0.1)"/>
    <rect x="506" y="228" width="172" height="7" rx="3.5" fill="#0f766e" class="nn"/>
    <!-- Labels -->
    <text x="506" y="250" font-family="Manrope,sans-serif" font-size="9" font-weight="700" fill="rgba(255,255,255,0.45)" letter-spacing="0.5">CONFIDENCE</text>
    <text x="704" y="250" font-family="Sora,sans-serif" font-size="10" font-weight="800" fill="#9fe7dd" text-anchor="end">94.2%</text>
  </g>

  <!-- ══ ACTION LAYER CARD ══ -->
  <g filter="url(#s1)">
    <rect x="488" y="308" width="234" height="178" rx="12" fill="#ffffff"/>
    <!-- Top accent blue -->
    <rect x="488" y="308" width="234" height="5" rx="3" fill="#2563eb"/>

    <text x="506" y="338" font-family="Sora,sans-serif" font-size="15" font-weight="800" fill="#17202a">Action layer</text>

    <!-- Action rows -->
    <!-- Row 1: Triggered -->
    <rect x="506" y="350" width="10" height="10" rx="3" fill="#0f766e"/>
    <rect x="522" y="352" width="80" height="6" rx="3" fill="#0f766e" opacity="0.8"/>
    <rect x="608" y="348" width="56" height="16" rx="8" fill="#e8f7f5"/>
    <text x="636" y="360" font-family="Manrope,sans-serif" font-size="9" font-weight="700" fill="#0f766e" text-anchor="middle">TRIGGERED</text>

    <!-- Row 2: Scheduled -->
    <rect x="506" y="376" width="10" height="10" rx="3" fill="#2563eb"/>
    <rect x="522" y="378" width="64" height="6" rx="3" fill="#2563eb" opacity="0.65"/>
    <rect x="608" y="374" width="56" height="16" rx="8" fill="#eff6ff"/>
    <text x="636" y="386" font-family="Manrope,sans-serif" font-size="9" font-weight="700" fill="#2563eb" text-anchor="middle">SCHEDULED</text>

    <!-- Row 3: Standby -->
    <rect x="506" y="402" width="10" height="10" rx="3" fill="#d9e2ea"/>
    <rect x="522" y="404" width="72" height="6" rx="3" fill="#d9e2ea"/>
    <rect x="608" y="400" width="56" height="16" rx="8" fill="#f7f9fb"/>
    <text x="636" y="412" font-family="Manrope,sans-serif" font-size="9" font-weight="700" fill="#94a3b4" text-anchor="middle">STANDBY</text>

    <!-- Divider -->
    <line x1="506" y1="428" x2="706" y2="428" stroke="#d9e2ea" stroke-width="1.5"/>

    <!-- Status bar -->
    <circle cx="518" cy="452" r="6" fill="#0f766e" class="bk"/>
    <text x="532" y="456" font-family="Manrope,sans-serif" font-size="11" font-weight="700" fill="#0f766e">System active</text>
    <circle cx="688" cy="452" r="11" fill="#e85d4f"/>
    <circle cx="688" cy="452" r="6"  fill="#ffffff" opacity="0.45"/>

    <!-- Throughput mini bar chart -->
    <g transform="translate(506,464)">
      <rect x="0"  y="12" width="8" height="12" rx="3" fill="#2563eb" opacity="0.7"/>
      <rect x="12" y="8"  width="8" height="16" rx="3" fill="#2563eb" opacity="0.55"/>
      <rect x="24" y="4"  width="8" height="20" rx="3" fill="#2563eb" opacity="0.85"/>
      <rect x="36" y="10" width="8" height="14" rx="3" fill="#2563eb" opacity="0.65"/>
      <rect x="48" y="6"  width="8" height="18" rx="3" fill="#2563eb" opacity="0.75"/>
    </g>
  </g>

</svg>
