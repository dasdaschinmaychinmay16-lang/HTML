<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Industrial AI automation scene">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset=".56" stop-color="#eaf4f2"/>
      <stop offset="1" stop-color="#dfeaff"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f5f7f9"/>
      <stop offset="1" stop-color="#dce5ec"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102a43"/>
      <stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <style>
      .signal{stroke-dasharray:10 12;animation:dash 9s linear infinite}
      .pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}
      .float{animation:float 5s ease-in-out infinite;transform-origin:center}
      @keyframes dash{to{stroke-dashoffset:-180}}
      @keyframes pulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.06)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
    </style>
  </defs>
  <rect width="1600" height="900" fill="url(#sky)"/>
  <path d="M0 668h1600v232H0z" fill="url(#floor)"/>
